server:
  port: 8080

spring:
  application:
    name: hk-video
  mvc:
    async:
      request-timeout: 300000

logging:
  level:
    root: INFO
    com.example.hkvideo: DEBUG
    com.hikvision: DEBUG
    org.apache.http: DEBUG
    org.apache.hc: DEBUG

hikvision:
  # 综合安防平台 API 网关地址
  host: ${HIKVISION_HOST:https://218.92.52.10:1443}
  artemis-path: /artemis
  app-key: ${HIKVISION_APP_KEY:24651196}
  app-secret: ${HIKVISION_APP_SECRET:W1TtDrtBwdU2ZyrFDf6W}
  # 老版本平台可改为 /api/resource/v1/cameras
  camera-search-path: /api/resource/v2/camera/search
  # 老版本平台可改为 /api/video/v1/cameras/previewURLs
  preview-path: /api/video/v2/cameras/previewURLs
  playback-path: /api/video/v2/cameras/playbackURLs
  ptz-path: /api/video/v1/ptzs/controlling
  capture-path: /api/video/v1/manualCapture
  manual-record-start-path: /api/video/v1/manualRecord/start
  manual-record-stop-path: /api/video/v1/manualRecord/stop
  include-sub-regions: true
  camera-auth-codes:
    - view
  connect-timeout: 5s
  read-timeout: 30s
  trust-all-ssl: true
  default-preview:
    protocol: rtsp
    stream-type: 0
    transmode: 1
    expand:
    streamform:
  ffmpeg:
    # FFmpeg 可执行文件路径
    path: ${FFMPEG_PATH:D:/code/hk_video/ffmpeg/ffmpeg-8.1.1-essentials_build/bin/ffmpeg.exe}
    # 单路转码超时（秒）
    timeout: 300
    # 最大同时转码路数
    max-streams: 10
    # H.264 源使用 copy（零 CPU），H.265 源改为 libx264
    video-codec: copy
    preset: ultrafast
