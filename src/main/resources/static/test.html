<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebSocket 视频播放测试</title>
    <script src="/jessibuca/jessibuca.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; }
        body { font-family: "Microsoft YaHei", system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 20px; }
        h1 { font-size: 22px; margin-bottom: 20px; color: #e0e0e0; }
        .controls { width: 100%; max-width: 900px; display: flex; gap: 10px; margin-bottom: 16px; }
        .controls input { flex: 1; height: 42px; padding: 0 14px; border: 1px solid #444; border-radius: 8px; background: #2a2a3e; color: #fff; font-size: 14px; outline: none; }
        .controls input:focus { border-color: #5c6bc0; }
        .controls button { height: 42px; padding: 0 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; }
        #playBtn { background: #4caf50; color: #fff; }
        #playBtn:hover { background: #43a047; }
        #stopBtn { background: #f44336; color: #fff; }
        #stopBtn:hover { background: #e53935; }
        #proxyBtn { background: #5c6bc0; color: #fff; }
        #proxyBtn:hover { background: #3f51b5; }
        .player-box { width: 100%; max-width: 900px; aspect-ratio: 16/9; background: #000; border: 2px solid #333; border-radius: 8px; overflow: hidden; }
        .log-box { width: 100%; max-width: 900px; margin-top: 16px; padding: 14px; background: #16213e; border: 1px solid #333; border-radius: 8px; font-family: "Consolas", monospace; font-size: 13px; max-height: 250px; overflow-y: auto; line-height: 1.6; }
        .log-box .info { color: #81c784; }
        .log-box .error { color: #ef5350; }
        .log-box .warn { color: #ffb74d; }
        .tips { width: 100%; max-width: 900px; margin-top: 14px; padding: 12px 16px; background: #1e2a45; border: 1px solid #334; border-radius: 8px; font-size: 13px; color: #aaa; line-height: 1.8; }
        .row2 { width: 100%; max-width: 900px; display: flex; gap: 10px; margin-bottom: 10px; }
        .row2 label { color: #aaa; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .row2 select { height: 34px; padding: 0 8px; border: 1px solid #444; border-radius: 6px; background: #2a2a3e; color: #fff; font-size: 13px; }
    </style>
</head>
<body>

<h1>🎥 WebSocket 视频播放测试</h1>

<div class="controls">
    <input id="wsUrl" type="text" placeholder="输入 ws:// 地址，例如 ws://218.92.52.10:559/openUrl/xxxxx">
    <button id="playBtn">▶ 播放</button>
    <button id="stopBtn">⏹ 停止</button>
    <button id="proxyBtn">🔄 代理播放</button>
</div>

<div class="row2">
    <label>缓冲:
        <select id="bufferSelect">
            <option value="0">0s (最低延迟)</option>
            <option value="0.2" selected>0.2s</option>
            <option value="0.5">0.5s</option>
            <option value="1">1s</option>
            <option value="2">2s</option>
        </select>
    </label>
    <label>解码:
        <select id="decoderSelect">
            <option value="wasm" selected>WASM 软解 (支持H265)</option>
            <option value="mse">MSE 硬解 (仅H264)</option>
        </select>
    </label>
</div>

<div class="player-box" id="container"></div>

<div class="log-box" id="logBox"></div>

<div class="tips">
    <strong>使用说明：</strong><br>
    • <b>播放</b>：直接用浏览器 WebSocket 连接输入的地址<br>
    • <b>代理播放</b>：通过后端 <code>/ws/proxy</code> 代理连接（解决跨域/网络不通问题）<br>
    • 支持 H.264 和 H.265 (HEVC) 解码<br>
    • 取流 URL 有效期 5 分钟，过期需重新获取
</div>

<script>
const logBox = document.getElementById("logBox");
const wsUrlInput = document.getElementById("wsUrl");
let player = null;

function log(msg, type = "info") {
    const time = new Date().toLocaleTimeString();
    const div = document.createElement("div");
    div.className = type;
    div.textContent = `[${time}] ${msg}`;
    logBox.appendChild(div);
    logBox.scrollTop = logBox.scrollHeight;
}

function getConfig() {
    const buffer = parseFloat(document.getElementById("bufferSelect").value);
    const decoder = document.getElementById("decoderSelect").value;
    return {
        container: document.getElementById("container"),
        decoder: "/jessibuca/decoder.js",
        videoBuffer: buffer,
        isResize: true,
        isFlv: true,
        hasAudio: true,
        loadingText: "连接中...",
        debug: false,
        supportDblclickFullscreen: true,
        showBandwidth: true,
        operateBtns: { fullscreen: true, screenshot: true, play: true, audio: true },
        forceNoOffscreen: true,
        isNotMute: false,
        useMSE: decoder === "mse",
        useWCS: decoder === "mse"
    };
}

function destroy() {
    if (player) {
        player.destroy();
        player = null;
        log("播放器已销毁");
    }
}

function play(url) {
    destroy();
    log("创建 Jessibuca 播放器...");
    player = new Jessibuca(getConfig());

    player.on("play", () => log("▶ 开始播放"));
    player.on("pause", () => log("⏸ 已暂停", "warn"));
    player.on("timeout", () => log("⏰ 播放超时", "error"));
    player.on("error", (e) => log("❌ 错误: " + (e.msg || e.type || JSON.stringify(e)), "error"));
    player.on("videoInfo", (info) => log(`📹 视频信息: ${info.width}x${info.height}, codec=${info.encType || "unknown"}`));
    player.on("audioInfo", (info) => log(`🔊 音频信息: sampleRate=${info.sampleRate}, channels=${info.channels}`));
    player.on("bps", (bps) => { /* 静默 */ });
    player.on("log", (data) => log("LOG: " + data.type));

    log("正在连接: " + url);
    player.play(url);
}

// 直连播放
document.getElementById("playBtn").addEventListener("click", () => {
    const url = wsUrlInput.value.trim();
    if (!url) { log("请输入 ws:// 地址", "error"); return; }
    play(url);
});

// 代理播放
document.getElementById("proxyBtn").addEventListener("click", () => {
    const url = wsUrlInput.value.trim();
    if (!url) { log("请输入 ws:// 地址", "error"); return; }
    const wsProtocol = location.protocol === "https:" ? "wss:" : "ws:";
    const proxyUrl = `${wsProtocol}//${location.host}/ws/proxy?url=${encodeURIComponent(url)}`;
    log("使用后端代理: " + proxyUrl, "warn");
    play(proxyUrl);
});

// 停止
document.getElementById("stopBtn").addEventListener("click", destroy);

log("测试页面就绪，请输入 ws:// 地址后点击播放");
</script>
</body>
</html>
